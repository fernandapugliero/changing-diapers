  <style>
    /* ===== Base ===== */
    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 2rem;
      background: #fff;
      color: #333;
    }

    /* Container central */
    .page {
      max-width: 1200px;
      margin: 0 auto;
    }

    /* ===== Navegação ===== */
    nav {
      margin-bottom: 2rem;
      padding-top: 1rem;
      display: flex;
      align-items: center;
    }
    nav img {
      width: 30px;
      height: auto;
      margin-right: 30px;
    }
    nav a {
      margin-right: 20px;
      text-decoration: none;
      font-weight: 600;
      color: inherit;
    }

    /* ===== Títulos ===== */
    h1 {
      font-size: 2rem;
      margin: 0 0 0.5rem 0;
      text-align: center;
      line-height: 1.2;
    }
    h2 {
      font-size: 1.1rem;
      font-weight: 400;
      color: #666;
      margin: 0 0 2rem 0;
      text-align: center;
      line-height: 1.4;
    }

    /* ===== ⭐ RATING STARS ===== */
    .star-rating {
      --rating: 0;
      --star-color: #e0e0e0;
      --star-fill: #f5c518;
      position: relative;
      display: inline-block;
      font-size: 18px;
      font-family: "Arial", "Helvetica", sans-serif;
      line-height: 1;
      letter-spacing: 2px;
      margin-top: 4px;
    }
    .star-rating.is-empty::after { width: 0; }
    .star-note {
      display: inline-block;
      font-size: 12px;
      color: #777;
      margin-left: 6px;
      vertical-align: middle;
    }
    .star-rating::before { content: "★★★★★"; color: var(--star-color); }
    .star-rating::after {
      content: "★★★★★";
      color: var(--star-fill);
      position: absolute;
      top: 0;
      left: 0;
      width: calc((var(--rating) / 5) * 100%);
      overflow: hidden;
      white-space: nowrap;
      pointer-events: none;
    }

    /* ===== Rodapé ===== */
    footer {
      margin-top: 3rem;
      text-align: center;
      font-size: 0.9rem;
      color: #777;
    }
    footer a {
      color: #0070f3;
      text-decoration: none;
    }
    footer a:hover { text-decoration: underline; }

    @media (max-width: 768px) {
      body { padding: 2rem; }
    }

    /***************************************************************
     * ====== /BERLIN ======
     ***************************************************************/
    .filters-wrap{
      max-width: 980px;
      margin: 0 auto 1rem auto;
    }

    /* Mobile: botão para abrir/fechar filtros */
    .filters-toggle{
      display: none;
      margin: 0 auto 0.75rem auto;
      height: 38px;
      padding: 0 14px;
      border: 1px solid #ddd;
      border-radius: 10px;
      background: #f7f7f7;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      color: #333;
    }
    .filters-toggle:hover{ background:#efefef; }

    .filters-panel{
      /* Desktop: sempre aberto */
      display: block;
    }

    .filters-actions{
      display:flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: .75rem;
    }

    .btn-small{
      height: 36px;
      padding: 0 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #f7f7f7;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      color: #333;
    }
    .btn-small:hover{ background:#efefef; }

    .chip-grid{
      display:flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-top: 0.75rem;
    }

    /* Chips */
    .chip{
      display:flex;
      align-items:center;
      border: 1px solid #ddd;
      border-radius: 999px;
      padding: 10px 14px;
      background: #f7f7f7;
      cursor:pointer;
      font: inherit;
      color: #333;
      user-select:none;
      transition: background .15s ease, border-color .15s ease, color .15s ease;
    }
    .chip:hover{ background:#efefef; }
    .chip[data-selected="true"]{
      background: #1f9d55;
      border-color: #1f9d55;
      color: #fff;
    }

    /* ✅ Mobile: chips menores para caber melhor */
    @media (max-width: 520px){
      .chip-grid{ gap: 8px; }
      .chip{
        padding: 8px 10px;
        font-size: 13px;
      }
      .btn-small{
        height: 34px;
        font-size: 12.5px;
      }
      .filters-toggle{
        display: block; /* aparece no mobile */
      }
      /* por padrão no mobile, filtros ficam FECHADOS */
      .filters-panel{
        display: none;
      }
      .filters-wrap[data-open="true"] .filters-panel{
        display: block;
      }
    }

    .results-line{
      text-align:center;
      margin-top: 0.75rem;
      color:#555;
      font-size: .95rem;
    }

    .cards-grid{
      display:grid;
      grid-template-columns: 1fr;
      gap: 1rem;
      margin-top: 1.25rem;
    }
    @media (min-width: 768px){
      .cards-grid{ grid-template-columns: repeat(3, 1fr); }
    }

    .place-card{
      background: #fff;
      border: 1px solid #eee;
      border-radius: 12px;
      padding: 0.75rem;
      font-size: 0.9rem;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      display:flex;
      flex-direction:column;
      min-height: 100%;
    }

    .place-media{
      width: 100%;
      height: 240px;
      border-radius: 8px;
      background: #f6f6f6;
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
      margin-bottom: .5rem;
    }
    .place-media img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }
    .no-photo{ font-size: 0.85rem; color:#777; }

    .place-title{
      font-size: 1rem;
      font-weight: 600;
      color:#333;
      text-align:left;
      margin: 0.25rem 0 0.15rem 0;
    }
    .place-quote{
      font-size: 0.85rem;
      color: #555;
      font-style: italic;
      margin: 0.25rem 0 0.5rem 0;
      text-align:left;
      line-height: 1.35;
    }
    .place-meta{
      font-size: 0.8rem;
      color:#777;
      margin-top: 0.25rem;
      text-align:left;
      line-height: 1.35;
    }

    .tags{
      display:flex;
      flex-wrap:wrap;
      gap: 6px;
      margin-top: .5rem;
    }
    .tag{
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid #eee;
      color:#555;
      background:#fafafa;
      line-height: 1;
    }

    .loading-box{
      max-width: 720px;
      margin: 1.5rem auto 0 auto;
      border: 1px dashed rgba(0,0,0,0.2);
      border-radius: 12px;
      padding: 12px;
      text-align:center; /* ✅ centralizado */
      color:#666;
    }
    .error-box{
      max-width: 720px;
      margin: 1.5rem auto 0 auto;
      border: 1px solid rgba(255,0,0,0.25);
      background: rgba(255,0,0,0.05);
      border-radius: 12px;
      padding: 12px;
      text-align:left;
      color:#8a2b2b;
    }
  </style>

<body>
  <div class="page">
    <nav>
      <img src="images/logo.png" alt="Fix My Diaper Logo">
      <a href="https://fixmydiaper.com/">Map</a>
      <a href="list">List</a>
      <a href="submit">Submit</a>
    </nav>

    <h1>Changing Tables in Berlin</h1>
    <h2>Select one or more Berlin neighborhoods to see cafés, restaurants and public places with changing tables.</h2>

    <section class="filters-wrap" id="filtersWrap" data-open="false" aria-label="Neighborhood filters">
      <!-- Mobile toggle -->
      <button class="filters-toggle" id="filtersToggle" type="button">Filters</button>

      <div class="filters-panel" id="filtersPanel">
        <div class="chip-grid" id="neighborhoodChips"></div>

        <div class="filters-actions">
          <button class="btn-small" id="selectAllBtn" type="button">Select all</button>
          <button class="btn-small" id="clearBtn" type="button">Clear</button>
        </div>

        <div class="results-line">
          <strong id="resultsCount">0</strong> places
          <span id="activeFiltersText"></span>
        </div>
      </div>
    </section>

    <div id="loading" class="loading-box">Loading places…</div>
    <div id="error" class="error-box" style="display:none;"></div>
    <section id="cardsGrid" class="cards-grid" style="display:none;" aria-label="Places list"></section>

    <footer>
      <a href="about">About</a> | 
      <a href="submit">Submit a Location</a> |
      <a href="https://www.instagram.com/fixmydiaper">Instagram</a><br><br>
      Made with ♥️ in Berlin<br />
      Created by <a href="https://fernandapugliero.com" target="_blank">Fernanda Pugliero</a>
    </footer>
  </div>

  <script>
    const neighborhoods = [
      "Charlottenburg - Wilmersdorf",
      "Friedrichshain",
      "Kreuzberg",
      "Lichtenberg",
      "Mitte",
      "Neukölln",
      "Pankow - Prenzlauerberg",
      "Reinickendorf",
      "Spandau",
      "Steglitz - Zehlendorf",
      "Tempelhof - Schöneberg",
      "Treptow - Köpenick"
    ];

    const DATA_URL = "/places-berlin.json";

    const state = { selected: new Set(), all: [], filtered: [] };

    // Default: ALL neighborhoods selected
    neighborhoods.forEach(n => state.selected.add(n));

    const el = {
      filtersWrap: document.getElementById("filtersWrap"),
      filtersToggle: document.getElementById("filtersToggle"),
      filtersPanel: document.getElementById("filtersPanel"),

      chips: document.getElementById("neighborhoodChips"),
      grid: document.getElementById("cardsGrid"),
      loading: document.getElementById("loading"),
      error: document.getElementById("error"),
      resultsCount: document.getElementById("resultsCount"),
      activeFiltersText: document.getElementById("activeFiltersText"),
      clearBtn: document.getElementById("clearBtn"),
      selectAllBtn: document.getElementById("selectAllBtn")
    };

    function isMobile(){
      return window.matchMedia && window.matchMedia("(max-width: 520px)").matches;
    }

    function getNeighborhood(p){ return (p.neighborhood || "").trim(); }
    function getPhotoUrl(p){ return p.photo_url || null; }
    function getReview(p){ return (p.review || "").trim(); }

    function getTags(p){
      const merged = [
        ...(Array.isArray(p.changing_table_location) ? p.changing_table_location : (p.changing_table_location ? [p.changing_table_location] : [])),
        ...(Array.isArray(p.supplies_available) ? p.supplies_available : (p.supplies_available ? [p.supplies_available] : [])),
        ...(Array.isArray(p.changing_table_condition) ? p.changing_table_condition : (p.changing_table_condition ? [p.changing_table_condition] : [])),
      ].map(x => String(x).trim()).filter(Boolean);

      const seen = new Set();
      const out = [];
      for (const t of merged){
        const k = t.toLowerCase();
        if (!seen.has(k)){ seen.add(k); out.push(t); }
      }
      return out;
    }

    function renderChips(){
      el.chips.innerHTML = "";
      neighborhoods.forEach(n => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "chip";
        btn.setAttribute("data-neighborhood", n);
        btn.setAttribute("data-selected", state.selected.has(n) ? "true" : "false");
        btn.textContent = n;
        btn.addEventListener("click", () => toggleNeighborhood(n));
        el.chips.appendChild(btn);
      });
      updateFiltersText();
    }

    function toggleNeighborhood(n){
      if (state.selected.has(n)) state.selected.delete(n);
      else state.selected.add(n);

      const chip = el.chips.querySelector(`[data-neighborhood="${cssEscape(n)}"]`);
      if (chip){
        chip.setAttribute("data-selected", state.selected.has(n) ? "true" : "false");
      }
      applyFilterAndRender();
    }

    function clearAll(){
      state.selected.clear();
      renderChips();
      applyFilterAndRender();
    }

    function selectAll(){
      neighborhoods.forEach(n => state.selected.add(n));
      renderChips();
      applyFilterAndRender();
    }

    function updateFiltersText(){
      if (state.selected.size === 0) {
        el.activeFiltersText.textContent = "";
      } else if (state.selected.size === neighborhoods.length) {
        el.activeFiltersText.textContent = " (all neighborhoods)";
      } else {
        el.activeFiltersText.textContent = ` (filter: ${Array.from(state.selected).join(", ")})`;
      }
    }

    function showLoading(on){
      el.loading.style.display = on ? "block" : "none";
      el.grid.style.display = on ? "none" : "grid";
      el.error.style.display = "none";
    }

    function showError(msg){
      el.error.style.display = "block";
      el.error.textContent = msg;
      el.grid.style.display = "none";
    }

    function updateCount(){
      el.resultsCount.textContent = String(state.filtered.length);
      updateFiltersText();
    }

    function renderEmptyState(){
      el.grid.style.display = "grid";
      el.grid.innerHTML = `<div class="loading-box">
        Select one or more neighborhoods above to see places with changing tables in Berlin.
      </div>`;
    }

    function applyFilterAndRender(){
      const selected = state.selected;

      if (selected.size === 0) {
        state.filtered = [];
        renderEmptyState();
        updateCount();
        return;
      }

      state.filtered = state.all.filter(p => selected.has(getNeighborhood(p)));

      // Most recent first (created_at desc)
      state.filtered.sort((a,b) => {
        const da = String(a.created_at || "");
        const db = String(b.created_at || "");
        return db.localeCompare(da);
      });

      renderCards();
      updateCount();
    }

    function renderCards(){
      el.grid.innerHTML = "";
      el.grid.style.display = "grid";

      if (state.filtered.length === 0){
        el.grid.innerHTML = `<div class="loading-box">No results for the selected neighborhoods.</div>`;
        return;
      }

      const frag = document.createDocumentFragment();
      state.filtered.forEach(p => frag.appendChild(buildCard(p)));
      el.grid.appendChild(frag);
    }

    function buildCard(p){
      const card = document.createElement("article");
      card.className = "place-card";

      const media = document.createElement("div");
      media.className = "place-media";
      const photoUrl = getPhotoUrl(p);
      if (photoUrl){
        const img = document.createElement("img");
        img.loading = "lazy";
        img.src = photoUrl;
        img.alt = `${p.name || "Place"} changing table`;
        media.appendChild(img);
      } else {
        const span = document.createElement("span");
        span.className = "no-photo";
        span.textContent = "No photo yet";
        media.appendChild(span);
      }

      const stars = (typeof p.stars === "number") ? p.stars : null;
      const starDiv = document.createElement("div");
      starDiv.className = "star-rating";
      starDiv.style.setProperty("--rating", stars || 0);
      if (!stars) starDiv.classList.add("is-empty");

      const note = document.createElement("span");
      note.className = "star-note";
      note.textContent = stars ? `${stars}/5` : "Not rated yet";

      const starsWrap = document.createElement("div");
      starsWrap.appendChild(starDiv);
      starsWrap.appendChild(note);

      const title = document.createElement("div");
      title.className = "place-title";
      title.textContent = p.name || "Unnamed place";

      const meta = document.createElement("div");
      meta.className = "place-meta";
      const type = (p.type || "").toString().trim();
      const address = (p.address || "").toString().trim();
      meta.innerHTML = `${escapeHtml(type || "Not specified")}${address ? "<br>" + escapeHtml(address) : ""}`;

      const reviewText = getReview(p);
      let quote = null;
      if (reviewText){
        quote = document.createElement("div");
        quote.className = "place-quote";
        quote.textContent = `“${reviewText}”`;
      }

      const tags = getTags(p);
      const tagsWrap = document.createElement("div");
      tagsWrap.className = "tags";
      tags.slice(0, 12).forEach(t => {
        const tag = document.createElement("span");
        tag.className = "tag";
        tag.textContent = t;
        tagsWrap.appendChild(tag);
      });

      card.appendChild(media);
      card.appendChild(starsWrap);
      card.appendChild(title);
      card.appendChild(meta);
      if (quote) card.appendChild(quote);
      if (tags.length) card.appendChild(tagsWrap);

      return card;
    }

    // Mobile filters toggle
    function syncFiltersToggleLabel(){
      if (!isMobile()) return;
      const open = el.filtersWrap.getAttribute("data-open") === "true";
      el.filtersToggle.textContent = open ? "Hide filters" : "Filters";
    }

    function toggleFiltersPanel(){
      const open = el.filtersWrap.getAttribute("data-open") === "true";
      el.filtersWrap.setAttribute("data-open", open ? "false" : "true");
      syncFiltersToggleLabel();
    }

    async function load(){
      showLoading(true);
      try{
        const res = await fetch(DATA_URL, { cache: "no-store" });
        if (!res.ok) throw new Error(`Failed to load ${DATA_URL}: ${res.status} ${res.statusText}`);
        const data = await res.json();
        if (!Array.isArray(data)) throw new Error(`${DATA_URL} is not an array.`);

        state.all = data;

        renderChips();
        applyFilterAndRender();

        // Mobile: start with filters closed (cards visible first)
        if (isMobile()){
          el.filtersWrap.setAttribute("data-open", "false");
          syncFiltersToggleLabel();
        }

        showLoading(false);
      } catch(e){
        showLoading(false);
        showError(e.message || String(e));
      }
    }

    function escapeHtml(str){
      return String(str).replace(/[&<>"']/g, s => ({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
      }[s]));
    }
    function cssEscape(str){
      return String(str).replace(/["\\]/g, "\\$&");
    }

    el.clearBtn.addEventListener("click", clearAll);
    el.selectAllBtn.addEventListener("click", selectAll);

    el.filtersToggle.addEventListener("click", toggleFiltersPanel);
    window.addEventListener("resize", syncFiltersToggleLabel);

    load();
  </script>
</body>
