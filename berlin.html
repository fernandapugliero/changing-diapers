  <style>
    /* ===== Base ===== */
    body {
      font-family: 'Inter', sans-serif;
      margin: 0;

    }

    /* Container central */
    .page {

    nav {

    /* subtítulos de seção (texto logo abaixo do título) */

    /* ===== ⭐ RATING STARS ===== */
    .star-rating {
      --rating: 0;
      --star-color: #e0e0e0;
      --star-fill: #f5c518;
      position: relative;
      display: inline-block;
      font-size: 18px;
      font-family: "Arial", "Helvetica", sans-serif;
      line-height: 1;
      letter-spacing: 2px;
      margin-top: 4px;
    }
    .star-rating.is-empty::after {
      width: 0;
    }
    .star-note {
      display: inline-block;
      font-size: 12px;
      color: #777;
      margin-left: 6px;
      vertical-align: middle;
    }
    .star-rating::before {
      content: "★★★★★";
      color: var(--star-color);
    }
    .star-rating::after {
      content: "★★★★★";
      color: var(--star-fill);
      position: absolute;
      top: 0;
      left: 0;
      width: calc((var(--rating) / 5) * 100%);
      overflow: hidden;
      white-space: nowrap;
      pointer-events: none;
    }

    /* ===== Rodapé ===== */
    footer {
      margin-top: 3rem;

    .chip-grid{

    .chip{
      display:flex;

    .chip[data-selected="true"]{

    .results-line{

    /* Cards: 3 colunas no desktop, 1 no mobile */
    .cards-grid{
      display:grid;
      grid-template-columns: 1fr;

      margin-top: 1.25rem;
    }
    @media (min-width: 768px){

        grid-template-columns: repeat(3, 1fr);

    .place-card{

<body>
  <div class="page">
    <nav>
      <img src="images/logo.png" alt="Fix My Diaper Logo">

      <a href="list">List</a>
      <a href="submit">Submit</a>
    </nav>

    <h1>Changing tables in Berlin</h1>
    <h2>Select one or more neighborhoods to filter the list.</h2>

    <section class="filters-wrap" aria-label="Neighborhood filters">
      <div class="chip-grid" id="neighborhoodChips"></div>

      <div class="filters-actions">
        <button class="btn-small" id="selectAllBtn" type="button">Select all</button>
        <button class="btn-small" id="clearBtn" type="button">Clear</button>
      </div>

      <div class="results-line">
        <strong id="resultsCount">—</strong> places
        <span id="activeFiltersText"></span>
      </div>
    </section>

    <div id="loading" class="loading-box">Loading places…</div>
    <div id="error" class="error-box" style="display:none;"></div>
    <section id="cardsGrid" class="cards-grid" style="display:none;" aria-label="Places list"></section>

    <footer>
      <a href="about">About</a> | 
      <a href="submit">Submit a Location</a> |
      <a href="https://www.instagram.com/fixmydiaper">Instagram</a><br><br>
      Made with ♥️ in Berlin<br />
      Created by <a href="https://fernandapugliero.com" target="_blank">Fernanda Pugliero</a>
    </footer>
  </div>

  <script>
    /*****************************************************************
     * Neighborhood list (alphabetical, as requested)
     *****************************************************************/
    const neighborhoods = [
      "Charlottenburg-Wilmersdorf",
      "Friedrichshain-Kreuzberg",
      "Lichtenberg",
      "Marzahn-Hellersdorf",
      "Mitte",
      "Neukölln",
      "Pankow",
      "Reinickendorf",
      "Spandau",
      "Steglitz-Zehlendorf",
      "Tempelhof-Schöneberg",
      "Treptow-Köpenick"
    ];

    /*****************************************************************
     * Data source (same JSON used by the map)
     *****************************************************************/
    const DATA_URL = "places-berlin.json";

    const state = {
      selected: new Set(), // neighborhoods IN
      all: [],
      filtered: []
    };

    const el = {
      chips: document.getElementById("neighborhoodChips"),
      grid: document.getElementById("cardsGrid"),
      loading: document.getElementById("loading"),
      error: document.getElementById("error"),
      resultsCount: document.getElementById("resultsCount"),
      activeFiltersText: document.getElementById("activeFiltersText"),
      clearBtn: document.getElementById("clearBtn"),
      selectAllBtn: document.getElementById("selectAllBtn")
    };

    function normalizeCity(raw) {
      return String(raw || "").toLowerCase().trim().replace(/,+$/,"");
    }

    // 0–10 (Airtable) -> 0–5 stars, rounded to .0/.5
    function starsFromScore10(rawScore) {
      if (typeof rawScore !== "number" || Number.isNaN(rawScore)) return null;
      let stars = Math.max(0, Math.min(5, rawScore / 2));
      stars = Math.round(stars * 2) / 2;
      return stars;
    }

    function getNeighborhood(place) {
      // compat: caso o JSON tenha vindo com chaves diferentes em alguma versão
      return (
        place.neighborhood ||
        place["Neighborhood (Berlin)"] ||
        place.Neighborhood ||
        ""
      ).toString().trim();
    }

    function getReview(place) {
      return (
        place.review ||
        place["Changing Table Review"] ||
        place["Changing Table Review "] ||
        place.changing_table_review ||
        ""
      ).toString().trim();
    }

    function getPhotoUrl(place) {
      // Suporta:
      // - place.photo_url / place.photoUrl (string)
      // - place.Photo / place.Photos (Airtable attachment array)
      const direct =
        place.photo_url ||
        place.photoUrl ||
        place.photo ||
        "";

      if (direct && typeof direct === "string") return direct;

      const att = place.Photo || place.Photos || place.photoAttachments;
      if (Array.isArray(att) && att.length > 0) {
        const first = att[0] || {};
        if (first.thumbnails && first.thumbnails.large && first.thumbnails.large.url) return first.thumbnails.large.url;
        if (first.url) return first.url;
      }
      return null;
    }

    function getTags(place) {
      // 3 grupos pedidos:
      // 1) Changing Table Location
      // 2) Available Supplies
      // 3) Changing Table Condition
      const a = place.changing_table_location ?? place["Changing Table Location"] ?? [];
      const b = place.supplies_available ?? place["Available Supplies"] ?? place["Available Suppllies"] ?? [];
      const c = place.conditions ?? place["Changing Table Condition"] ?? [];

      const toArr = (x) => Array.isArray(x) ? x : (x ? [x] : []);
      const merged = [...toArr(a), ...toArr(b), ...toArr(c)]
        .map(v => String(v).trim())
        .filter(Boolean);

      // remove duplicatas mantendo ordem
      const seen = new Set();
      const unique = [];
      for (const t of merged) {
        const key = t.toLowerCase();
        if (!seen.has(key)) { seen.add(key); unique.push(t); }
      }
      return unique;
    }

    function renderChips() {
      el.chips.innerHTML = "";
      neighborhoods.forEach((n) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "chip";
        btn.setAttribute("data-neighborhood", n);
        btn.setAttribute("data-selected", state.selected.has(n) ? "true" : "false");
        btn.innerHTML = `
          <span>${escapeHtml(n)}</span>
          <span class="state">${state.selected.has(n) ? "IN ✓" : "OUT"}</span>
        `;
        btn.addEventListener("click", () => toggleNeighborhood(n));
        el.chips.appendChild(btn);
      });
      updateFiltersText();
    }

    function toggleNeighborhood(n) {
      if (state.selected.has(n)) state.selected.delete(n);
      else state.selected.add(n);

      const chip = el.chips.querySelector(`[data-neighborhood="${cssEscape(n)}"]`);
      if (chip) {
        const on = state.selected.has(n);
        chip.setAttribute("data-selected", on ? "true" : "false");
        chip.querySelector(".state").textContent = on ? "IN ✓" : "OUT";
      }
      applyFilterAndRender();
    }

    function clearAll() {
      state.selected.clear();
      renderChips();
      applyFilterAndRender();
    }

    function selectAll() {
      neighborhoods.forEach(n => state.selected.add(n));
      renderChips();
      applyFilterAndRender();
    }

    function updateFiltersText() {
      if (state.selected.size === 0) {
        el.activeFiltersText.textContent = " (showing all neighborhoods)";
      } else {
        el.activeFiltersText.textContent = ` (filter: ${Array.from(state.selected).join(", ")})`;
      }
    }

    function showLoading(on) {
      el.loading.style.display = on ? "block" : "none";
      el.grid.style.display = on ? "none" : "grid";
      el.error.style.display = "none";
    }

    function showError(msg) {
      el.error.style.display = "block";
      el.error.textContent = msg;
      el.grid.style.display = "none";
    }

    function updateCount() {
      el.resultsCount.textContent = String(state.filtered.length);
      updateFiltersText();
    }

    function applyFilterAndRender() {
      const selected = state.selected;

      state.filtered = selected.size === 0
        ? state.all.slice()
        : state.all.filter(p => selected.has(getNeighborhood(p)));

      renderCards();
      updateCount();
    }

    function renderCards() {
      el.grid.innerHTML = "";

      if (state.filtered.length === 0) {
        el.grid.innerHTML = `<div class="loading-box">No results for the selected neighborhoods.</div>`;
        return;
      }

      const frag = document.createDocumentFragment();
      state.filtered.forEach(place => frag.appendChild(buildCard(place)));
      el.grid.appendChild(frag);
    }

    function buildCard(place) {
      const card = document.createElement("article");
      card.className = "place-card";

      // media
      const media = document.createElement("div");
      media.className = "place-media";
      const photoUrl = getPhotoUrl(place);
      if (photoUrl) {
        const img = document.createElement("img");
        img.loading = "lazy";
        img.src = photoUrl;
        img.alt = `${place.name || "Place"} changing table`;
        media.appendChild(img);
      } else {
        const span = document.createElement("span");
        span.className = "no-photo";
        span.textContent = "No photo yet";
        media.appendChild(span);
      }

      // stars + note
      const stars = starsFromScore10(place.overall_user_experience);
      const starsWrap = document.createElement("div");
      const starDiv = document.createElement("div");
      starDiv.className = "star-rating";
      starDiv.style.setProperty("--rating", stars || 0);
      if (!stars) starDiv.classList.add("is-empty");

      const note = document.createElement("span");
      note.className = "star-note";
      note.textContent = stars ? `${stars}/5` : "Not rated yet";

      starsWrap.appendChild(starDiv);
      starsWrap.appendChild(note);

      // title
      const title = document.createElement("div");
      title.className = "place-title";
      title.textContent = place.name || "Unnamed place";

      // meta (type + address)
      const meta = document.createElement("div");
      meta.className = "place-meta";
      const type = (place.type || "").toString().trim();
      const address = (place.address || "").toString().trim();
      meta.innerHTML = `${escapeHtml(type || "Not specified")}${address ? "<br>" + escapeHtml(address) : ""}`;

      // review
      const reviewText = getReview(place);
      let quote = null;
      if (reviewText) {
        quote = document.createElement("div");
        quote.className = "place-quote";
        quote.textContent = `“${reviewText}”`;
      }

      // tags
      const tags = getTags(place);
      const tagsWrap = document.createElement("div");
      tagsWrap.className = "tags";
      if (tags.length) {
        tags.slice(0, 12).forEach(t => {
          const tag = document.createElement("span");
          tag.className = "tag";
          tag.textContent = t;
          tagsWrap.appendChild(tag);
        });
      }

      card.appendChild(media);
      card.appendChild(starsWrap);
      card.appendChild(title);
      card.appendChild(meta);
      if (quote) card.appendChild(quote);
      if (tags.length) card.appendChild(tagsWrap);

      return card;
    }

    async function load() {
      showLoading(true);
      try {
        const res = await fetch(DATA_URL, { cache: "no-store" });
        if (!res.ok) throw new Error(`Failed to load ${DATA_URL}: ${res.status} ${res.statusText}`);
        const data = await res.json();
        if (!Array.isArray(data)) throw new Error("places-berlin.json is not an array.");

        // Berlin only
        const berlinOnly = data.filter(p => normalizeCity(p.city) === "berlin");

        // IMPORTANT: precisamos que o neighborhood venha preenchido com os 12 Bezirke
        // (Charlottenburg-Wilmersdorf, Mitte, etc.)
        state.all = berlinOnly;

        renderChips();
        applyFilterAndRender();
        showLoading(false);
      } catch (e) {
        showLoading(false);
        showError(e.message || String(e));
      }
    }

    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, s => ({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
      }[s]));
    }
    function cssEscape(str) {
      return String(str).replace(/["\\]/g, "\\$&");
    }

    el.clearBtn.addEventListener("click", clearAll);
    el.selectAllBtn.addEventListener("click", selectAll);

    load();
  </script>
