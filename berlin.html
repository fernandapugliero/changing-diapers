<!DOCTYPE html>
<html lang="en">
<head>  
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Changing Tables in Berlin | Fix My Diaper</title>

<meta name="description" content="Find baby-friendly places with changing tables in Berlin. Filter by neighborhood to discover cafés, restaurants and public places with diaper changing facilities.">

<link rel="stylesheet" href="style.css" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>

/* ===== Base ===== */

body{
font-family:'Inter',sans-serif;
margin:0;
padding:2rem;
background:#fff;
color:#333;
}

.page{
max-width:1200px;
margin:0 auto;
}

nav{
margin-bottom:2rem;
padding-top:1rem;
display:flex;
align-items:center;
}

nav img{
width:30px;
margin-right:30px;
}

nav a{
margin-right:20px;
text-decoration:none;
font-weight:600;
color:inherit;
}

h1{
font-size:2rem;
text-align:center;
margin:0 0 .5rem 0;
}

.intro{
text-align:center;
max-width:800px;
margin:0 auto 1.2rem auto;
font-size:.95rem;
color:#555;
}

.filters-wrap{
max-width:1000px;
margin:0 auto 1.5rem auto;
}

.chip-grid{
display:flex;
flex-wrap:wrap;
gap:8px;
justify-content:center;
margin-bottom:1rem;
}

.chip{
border:1px solid #ddd;
border-radius:999px;
padding:10px 14px;
background:#f7f7f7;
cursor:pointer;
font-size:14px;
}

.chip[data-selected="true"]{
background:#4da3ff;
border-color:#4da3ff;
color:#fff;
}

.filters-actions{
display:flex;
gap:12px;
justify-content:center;
}

.btn-small{
height:36px;
padding:0 12px;
border:1px solid #ddd;
border-radius:8px;
background:#f7f7f7;
font-weight:600;
cursor:pointer;
}

/* ===== cards ===== */

.cards-grid{
display:grid;
grid-template-columns:1fr;
gap:1rem;
margin-top:1rem;
}

@media(min-width:768px){
.cards-grid{
grid-template-columns:repeat(3,1fr);
}
}

.place-card{
background:#fff;
border:1px solid #eee;
border-radius:12px;
padding:.75rem;
box-shadow:0 2px 6px rgba(0,0,0,.08);
display:flex;
flex-direction:column;
}

.place-media{
height:240px;
border-radius:8px;
background:#f6f6f6;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
margin-bottom:.5rem;
}

.place-media img{
width:100%;
height:100%;
object-fit:cover;
}

.no-photo{
font-size:.85rem;
color:#777;
}

.place-title{
font-weight:600;
margin-top:.3rem;
}

.place-meta{
font-size:.8rem;
color:#777;
}

.place-quote{
font-style:italic;
font-size:.85rem;
margin-top:.3rem;
}

.tags{
display:flex;
flex-wrap:wrap;
gap:6px;
margin-top:.4rem;
}

.tag{
font-size:12px;
padding:5px 10px;
border-radius:999px;
background:#fafafa;
border:1px solid #eee;
}

.results-bottom{
text-align:center;
margin-top:2rem;
font-size:.95rem;
color:#555;
}

</style>
</head>

<body>

<div class="page">

<nav>
<img src="images/logo.png">
<a href="/">Map</a>
<a href="list">List</a>
<a href="submit">Submit</a>
</nav>

<h1>Changing Tables in Berlin</h1>

<p class="intro">
Find baby-friendly places with changing tables across Berlin.
</p>

<section class="filters-wrap">

<div id="neighborhoodChips" class="chip-grid"></div>

<div class="filters-actions">
<button id="selectAllBtn" class="btn-small">Select all</button>
<button id="clearBtn" class="btn-small">Clear</button>
</div>

</section>

<section id="cardsGrid" class="cards-grid"></section>

<div id="resultsBottom" class="results-bottom">
<strong id="resultsCount">0</strong> places
</div>

</div>

<script>

const DATA_URL="/places-berlin.json";

const neighborhoods=[
"Mitte",
"Neukölln",
"Kreuzberg",
"Friedrichshain",
"Spandau",
"Lichtenberg",
"Reinickendorf",
"Pankow-Prenzlauerberg",
"Treptow-Köpenick",
"Tempelhof-Schöneberg",
"Steglitz-Zehlendorf",
"Charlottenburg-Wilmersdorf"
];

const state={
selected:new Set(neighborhoods),
all:[],
filtered:[]
};

const el={
chips:document.getElementById("neighborhoodChips"),
grid:document.getElementById("cardsGrid"),
resultsCount:document.getElementById("resultsCount")
};

function getPhoto(p){

const small=p.photo_small_url||null;
const large=p.photo_large_url||null;
const legacy=p.photo_url||null;

let legacyFromArray=null;

if(!legacy && Array.isArray(p.photo) && p.photo.length>0){
legacyFromArray=p.photo[0].url;
}

return{
primary:large||small||legacy||legacyFromArray||null,
fallback:small||legacy||legacyFromArray||large||null
};

}

function renderChips(){

el.chips.innerHTML="";

neighborhoods.forEach(n=>{

const btn=document.createElement("button");
btn.className="chip";
btn.textContent=n;

btn.dataset.selected=state.selected.has(n);

btn.onclick=()=>{

if(state.selected.has(n)) state.selected.delete(n);
else state.selected.add(n);

btn.dataset.selected=state.selected.has(n);

applyFilter();

};

el.chips.appendChild(btn);

});

}

function applyFilter(){

state.filtered=state.all.filter(p=>state.selected.has(p.neighborhood));

state.filtered.sort((a,b)=>{

const ap=a.has_photo?1:0;
const bp=b.has_photo?1:0;

if(bp!==ap) return bp-ap;

return new Date(b.created_at)-new Date(a.created_at);

});

renderCards();

}

function renderCards(){

el.grid.innerHTML="";

state.filtered.forEach(p=>{

const card=document.createElement("article");
card.className="place-card";

const media=document.createElement("div");
media.className="place-media";

const photo=getPhoto(p);

if(photo.primary){

const img=document.createElement("img");

img.src=photo.primary;
img.loading="lazy";
img.decoding="async";

img.onerror=()=>{

if(img.dataset.fallbackTried){
media.innerHTML='<span class="no-photo">No photo yet</span>';
return;
}

img.dataset.fallbackTried=true;
img.src=photo.fallback;

};

media.appendChild(img);

}
else{

media.innerHTML='<span class="no-photo">No photo yet</span>';

}

const title=document.createElement("div");
title.className="place-title";
title.textContent=p.name;

const meta=document.createElement("div");
meta.className="place-meta";
meta.innerHTML=p.type+"<br>"+p.address;

card.appendChild(media);
card.appendChild(title);
card.appendChild(meta);

if(p.review){

const quote=document.createElement("div");
quote.className="place-quote";
quote.textContent="“"+p.review+"”";

card.appendChild(quote);

}

const tags=document.createElement("div");
tags.className="tags";

(p.changing_table_location||[]).forEach(t=>{

const span=document.createElement("span");
span.className="tag";
span.textContent=t;
tags.appendChild(span);

});

card.appendChild(tags);

el.grid.appendChild(card);

});

el.resultsCount.textContent=state.filtered.length;

}

async function load(){

const res=await fetch(DATA_URL);
state.all=await res.json();

renderChips();
applyFilter();

}

document.getElementById("clearBtn").onclick=()=>{

state.selected.clear();
renderChips();
applyFilter();

};

document.getElementById("selectAllBtn").onclick=()=>{

neighborhoods.forEach(n=>state.selected.add(n));
renderChips();
applyFilter();

};

load();

</script>

</body>
</html>
